
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تصنيف الأخبار - AraBERT</title>
  <style>
    body { font-family: Tahoma, Arial, sans-serif; margin: 24px; }
    .box { max-width: 900px; margin: 0 auto; }
    textarea { width: 100%; height: 180px; padding: 12px; font-size: 16px; }
    button { padding: 10px 18px; font-size: 16px; cursor: pointer; }
    .card { margin-top: 16px; padding: 14px; border: 1px solid #ddd; border-radius: 10px; }
    .err { color: #b00020; }
    .res { font-size: 18px; }
    .small { color: #444; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>تصنيف خبر: صحيح أم كاذب</h2>

    <form method="POST" action="/predict">
      <label for="news">اكتب الخبر هنا:</label><br><br>
      <textarea id="news" name="news" placeholder="الخبر">{{ news or "" }}</textarea>
      <br><br>
      <button type="submit">Submit</button>
    </form>

    {% if error %}
      <div class="card err">{{ error }}</div>
    {% endif %}

    {% if result %}
      <div class="card">
        <div class="res"><b>النتيجة:</b> {{ result }}</div>
        <div class="small">
          <b>الثقة:</b> {{ confidence }}<br>
          <b>احتمال كاذب:</b> {{ p_fake }} | <b>احتمال صحيح:</b> {{ p_true }}
        </div>
      </div>
    {% endif %}
  </div>
</body>
</html>
